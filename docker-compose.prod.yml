version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-stock_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stock_password}
      POSTGRES_DB: ${DB_NAME:-stock_alert}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-stock_user} -d ${DB_NAME:-stock_alert}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock_alert_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock_alert_network

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
      target: prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: postgresql://${DB_USER:-stock_user}:${DB_PASSWORD:-stock_password}@postgres:5432/${DB_NAME:-stock_alert}
      REDIS_URL: redis://redis:6379
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_ADMIN_CREDENTIALS: ${FIREBASE_ADMIN_CREDENTIALS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'bun',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    networks:
      - stock_alert_network

volumes:
  postgres_data:
  redis_data:

networks:
  stock_alert_network:
    driver: bridge
